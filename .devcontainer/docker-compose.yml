services:
  admin-frontend:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "5173:5173"
      - "8090:8090"
    env_file:
      - .env
    networks:
      - rg-det-shared

networks:
  rg-det-shared:
    name: rg-det-shared
    driver: bridge
