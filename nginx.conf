server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes are handled by TanStack Router on the client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite adds content hashes to built assets — safe to cache aggressively
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff2|woff|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Never cache HTML so deploys are picked up immediately
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
